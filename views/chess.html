<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="/css/chess.css">
    <link rel="stylesheet" href="/css/chat-widget.css">
</head>
<body>
    <div class="navbar">
        <a href="/" class="home-btn">🏠 Home</a>
    </div>

    <div class="container">
        <h1>♚ Chess ♔</h1>

        <!-- Game Mode Selection -->
        <div class="section" id="gameModePhase">
            <h2>Choose Game Mode</h2>
            <p class="center-text">Select how you want to play:</p>
            <div class="mode-selection">
                <button class="mode-btn solo-btn" onclick="selectGameMode('solo')">🤖 Solo vs AI</button>
                <button class="mode-btn multiplayer-btn" onclick="selectGameMode('multiplayer')">👥 Multiplayer Online</button>
            </div>
        </div>

        <!-- Difficulty Selection (Solo) -->
        <div class="section hidden" id="difficultyPhase">
            <h2>Choose Difficulty</h2>
            <p class="center-text">Select AI strength:</p>
            <div class="mode-selection">
                <button class="mode-btn" onclick="selectDifficulty('easy')">😊 Easy</button>
                <button class="mode-btn" onclick="selectDifficulty('medium')">🤔 Medium</button>
                <button class="mode-btn" onclick="selectDifficulty('hard')">😈 Hard</button>
            </div>
        </div>

        <!-- Color Selection -->
        <div class="section hidden" id="colorPhase">
            <h2>Choose Your Color</h2>
            <p class="center-text">Pick your pieces:</p>
            <div class="color-selection">
                <button class="color-btn white-btn" onclick="selectColor('white')">♔ White</button>
                <button class="color-btn black-btn" onclick="selectColor('black')">♚ Black</button>
            </div>
            <p class="center-text hint">White moves first</p>
        </div>

        <!-- Waiting Phase (Multiplayer) -->
        <div class="section hidden" id="waitingPhase">
            <h2 id="waitingTitle">Waiting for opponent...</h2>
            <p class="center-text">Share this page with a friend to play together!</p>
        </div>

        <!-- Game Board -->
        <div class="section hidden" id="gamePhase">
            <div class="game-info">
                <span id="turnIndicator" class="turn-indicator">White's Turn</span>
                <div class="timer-display" id="timerDisplay">⏱️ 30s</div>
                <div class="score-board">
                    <span class="score" id="whiteInfo">♔ White</span>
                    <span class="score" id="blackInfo">♚ Black</span>
                </div>
            </div>
            <div class="captured-pieces" id="capturedBlack"></div>
            <div id="board" class="board"></div>
            <div class="captured-pieces" id="capturedWhite"></div>
            <div id="gameMessage" class="game-message hidden"></div>
            <div id="promotionModal" class="promotion-modal hidden">
                <h3>Promote Pawn</h3>
                <div class="promotion-options" id="promotionOptions"></div>
            </div>
            <div style="text-align:center;margin-top:15px;">
                <button class="restart-btn" onclick="restartGame()">🔄 Restart</button>
                <button class="quit-btn" onclick="quitGame()">🚪 Quit</button>
            </div>
        </div>
    </div>

    <script src="/js/chess.js"></script>
    <script src="/js/chat-widget.js"></script>
</body>
</html>
