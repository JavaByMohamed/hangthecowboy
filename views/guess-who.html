<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess Who? - Celebrities</title>
    <link rel="stylesheet" href="/css/guess-who.css">
    <link rel="stylesheet" href="/css/chat-widget.css">
    <link rel="stylesheet" href="/css/invite-system.css">
</head>
<body>
    <div class="navbar">
        <a href="/" class="home-btn">🏠 Home</a>
    </div>

    <div id="mode-select" class="container">
        <h1>🕵️ Guess Who?</h1>
        <p class="subtitle">Figure out the secret character!</p>

        <div class="category-select">
            <p><strong>Choose a category:</strong></p>
            <div class="category-buttons">
                <button class="category-btn active" data-category="celebrities" onclick="selectCategory('celebrities')">🎤 Celebrities</button>
                <button class="category-btn" data-category="animals" onclick="selectCategory('animals')">🐾 Animals</button>
                <button class="category-btn" data-category="countries" onclick="selectCategory('countries')">🌍 Countries</button>
                <button class="category-btn" data-category="cartoons" onclick="selectCategory('cartoons')">🎨 Cartoons</button>
                <button class="category-btn" data-category="sports" onclick="selectCategory('sports')">⚽ Sports Stars</button>
            </div>
        </div>

        <div class="mode-buttons">
            <button onclick="startSolo()">🎯 Solo vs AI</button>
            <button onclick="startMultiplayer()">👥 Multiplayer</button>
        </div>
        <div id="mp-status" class="mp-status hidden"></div>
    </div>

    <div id="game-area" class="container hidden">
        <h1>🕵️ Guess Who?</h1>

        <div class="game-info">
            <span id="turn-indicator"></span>
            <span id="questions-count">❓ Questions: 0</span>
        </div>

        <div id="your-secret" class="secret-panel">
            Your secret celebrity: <strong id="your-secret-name">?</strong>
        </div>

        <div id="board" class="board"></div>

        <div class="question-panel">
            <div class="question-input">
                <input type="text" id="questionInput" placeholder="Ask a yes/no question..." onkeydown="if(event.key==='Enter')askQuestion()" />
                <button id="askBtn" onclick="askQuestion()">Ask</button>
            </div>
            <div id="chat-log" class="chat-log"></div>
        </div>

        <div class="actions">
            <button onclick="makeGuess()">🎯 Make a Guess</button>
            <button onclick="giveUp()">🏳️ Give Up</button>
        </div>

        <div id="overlay" class="overlay hidden">
            <div class="overlay-content">
                <h2 id="overlayTitle"></h2>
                <p id="overlayMsg"></p>
                <button onclick="backToMenu()">Play Again</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/invite-system.js"></script>
    <script src="/js/guess-who.js?v=20260530b"></script>
    <script src="/js/chat-widget.js"></script>
</body>
</html>
