<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess Who? - Celebrities</title>
    <link rel="stylesheet" href="/css/guess-who.css">
    <link rel="stylesheet" href="/css/chat-widget.css">
</head>
<body>
    <div class="navbar">
        <a href="/" class="home-btn">🏠 Home</a>
    </div>

    <div id="mode-select" class="container">
        <h1>🕵️ Guess Who? - Celebrity Edition</h1>
        <p class="subtitle">Figure out the secret celebrity!</p>
        <div class="mode-buttons">
            <button onclick="startSolo()">🎯 Solo vs AI</button>
            <button onclick="startMultiplayer()">👥 Multiplayer</button>
        </div>
        <div id="mp-status" class="mp-status hidden"></div>
    </div>

    <div id="game-area" class="container hidden">
        <h1>🕵️ Guess Who?</h1>

        <div class="game-info">
            <span id="turn-indicator"></span>
            <span id="questions-count">❓ Questions: 0</span>
        </div>

        <div id="your-secret" class="secret-panel">
            Your secret celebrity: <strong id="your-secret-name">?</strong>
        </div>

        <div id="board" class="board"></div>

        <div class="question-panel">
            <div class="question-input">
                <input type="text" id="questionInput" placeholder="Ask a yes/no question..." onkeydown="if(event.key==='Enter')askQuestion()" />
                <button id="askBtn" onclick="askQuestion()">Ask</button>
            </div>
            <div id="chat-log" class="chat-log"></div>
        </div>

        <div class="actions">
            <button onclick="makeGuess()">🎯 Make a Guess</button>
            <button onclick="giveUp()">🏳️ Give Up</button>
        </div>

        <div id="overlay" class="overlay hidden">
            <div class="overlay-content">
                <h2 id="overlayTitle"></h2>
                <p id="overlayMsg"></p>
                <button onclick="backToMenu()">Play Again</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/guess-who.js?v=20260530"></script>
    <script src="/js/chat-widget.js"></script>
</body>
</html>
